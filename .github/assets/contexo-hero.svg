<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="Contexo — git-like AI Agent context versioning and synchronization. One developer's agent pushes a distilled context page through the Contexo hub; teammates' agents pull it.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0C12"/>
      <stop offset="1" stop-color="#0E1219"/>
    </linearGradient>
    <radialGradient id="serverGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF7A1A" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#FF7A1A" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7A1A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF7A1A" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF7A1A" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#FFFFFF" opacity="0.028"/>
    </pattern>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="round"><rect x="2" y="2" width="1196" height="336" rx="18"/></clipPath>

    <style>
      /* ---- type ---- */
      .mono{font-family:'SFMono-Regular',ui-monospace,'Cascadia Code','JetBrains Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace;}
      .word{font-size:48px;font-weight:700;fill:#EDEFF3;letter-spacing:1px;}
      .tag{font-size:15px;fill:#7C8698;letter-spacing:1.4px;}
      .lbl{font-size:13px;fill:#5b6575;letter-spacing:1px;}
      .micro{font-size:12px;fill:#5b6575;letter-spacing:2px;}

      /* ---- graph base ---- */
      .card{fill:#11151D;stroke:#222b39;stroke-width:1.5;}
      .ln{fill:#283143;}
      .agent{fill:none;stroke:#3a4456;stroke-width:2;}

      /* ---- flow wires (always gently streaming) ---- */
      .wire{stroke:#2b3344;stroke-width:2;stroke-linecap:round;stroke-dasharray:2 8;animation:flow 1s linear infinite;}

      /* ---- intro: plays once, then holds ---- */
      /* base state is visible; the animation only enhances, so the banner
         still renders fully if CSS animation is ever stripped */
      .intro{animation:rise .9s cubic-bezier(.2,.7,.2,1) both;}
      .d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.31s}.d4{animation-delay:.44s}

      /* ---- looping choreography (6.6s) ---- */
      .srcGlow{animation:srcActive 6.6s ease-in-out infinite;}
      .ping{transform-box:fill-box;transform-origin:center;opacity:0;animation:ping 6.6s ease-in-out infinite;}
      .litB{animation:litB 6.6s ease-in-out infinite;}
      .litC{animation:litC 6.6s ease-in-out infinite;}
      .lblPush{animation:onPush 6.6s ease-in-out infinite;}
      .lblPull{animation:onPull 6.6s ease-in-out infinite;}

      .pkt{opacity:0;}
      .pPush{animation:pushPkt 6.6s ease-in-out infinite;}
      .pB{animation:pullB 6.6s ease-in-out infinite;}
      .pC{animation:pullC 6.6s ease-in-out infinite;}

      .cursor{animation:blink 1.1s steps(1) infinite;}
      .halo{animation:breathe 4.2s ease-in-out infinite alternate;}

      @keyframes flow{to{stroke-dashoffset:-10}}
      @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
      @keyframes blink{0%,48%{opacity:1}49%,100%{opacity:0}}
      @keyframes breathe{from{opacity:.55}to{opacity:1}}

      @keyframes srcActive{
        0%,8%{fill:#283143} 14%,30%{fill:#FF7A1A} 40%,100%{fill:#283143}
      }
      @keyframes onPush{0%,8%{fill:#5b6575}15%,32%{fill:#FFA24D}42%,100%{fill:#5b6575}}
      @keyframes onPull{0%,40%{fill:#5b6575}48%,64%{fill:#FFA24D}74%,100%{fill:#5b6575}}

      @keyframes pushPkt{
        0%,15%{opacity:0;transform:translate(0,0)}
        17%{opacity:1}
        36%{opacity:1;transform:translate(282px,-4px)}
        39%{opacity:0;transform:translate(282px,-4px)}
        100%{opacity:0}
      }
      @keyframes pullB{
        0%,43%{opacity:0;transform:translate(0,0)}
        45%{opacity:1}
        63%{opacity:1;transform:translate(308px,-16px)}
        66%{opacity:0}100%{opacity:0}
      }
      @keyframes pullC{
        0%,45%{opacity:0;transform:translate(0,0)}
        47%{opacity:1}
        65%{opacity:1;transform:translate(308px,64px)}
        68%{opacity:0}100%{opacity:0}
      }
      @keyframes ping{
        0%,36%{opacity:0;transform:scale(.6)}
        40%{opacity:.9;transform:scale(.85)}
        52%{opacity:0;transform:scale(1.7)}100%{opacity:0}
      }
      @keyframes litB{0%,46%{fill:#283143}56%,80%{fill:#FF7A1A}92%,100%{fill:#283143}}
      @keyframes litC{0%,48%{fill:#283143}58%,80%{fill:#FF7A1A}92%,100%{fill:#283143}}

      @media (prefers-reduced-motion: reduce){
        .intro{opacity:1;animation:none}
        .wire,.cursor,.halo,.srcGlow,.ping,.litB,.litC,.lblPush,.lblPull{animation:none}
        .pkt{opacity:0}
        .litB .ln,.litC .ln{fill:#FF7A1A}
      }
    </style>
  </defs>

  <!-- backdrop -->
  <g clip-path="url(#round)">
    <rect x="2" y="2" width="1196" height="336" fill="url(#bg)"/>
    <rect x="2" y="2" width="1196" height="336" fill="url(#dots)"/>
    <circle class="halo" cx="600" cy="142" r="150" fill="url(#serverGlow)"/>
    <rect x="2" y="2" width="1196" height="2" fill="url(#edge)"/>
  </g>
  <rect x="2.75" y="2.75" width="1194.5" height="334.5" rx="17.5" fill="none" stroke="#1b2230" stroke-width="1.5"/>

  <!-- ===== knowledge graph ===== -->
  <!-- wires -->
  <path class="wire" d="M262 146 H540"/>
  <path class="wire" d="M648 130 L946 114"/>
  <path class="wire" d="M648 156 L946 214"/>

  <!-- labels -->
  <text class="mono lbl lblPush" x="402" y="130" text-anchor="middle">ctx&#160;push</text>
  <text class="mono lbl lblPull" x="812" y="96" text-anchor="middle">ctx&#160;pull</text>

  <!-- Dev A : source agent card -->
  <g class="intro d1">
    <text class="mono micro" x="72" y="88">DEV&#160;A</text>
    <rect class="card" x="70" y="96" width="190" height="98" rx="13"/>
    <circle class="agent" cx="94" cy="122" r="8"/>
    <circle cx="94" cy="122" r="3" fill="#FF7A1A"/>
    <rect x="112" y="117" width="86" height="7" rx="3.5" fill="#3a4456"/>
    <rect class="ln srcGlow" x="88" y="146" width="154" height="7" rx="3.5"/>
    <rect class="ln srcGlow" x="88" y="162" width="120" height="7" rx="3.5"/>
    <rect class="ln srcGlow" x="88" y="178" width="92"  height="7" rx="3.5"/>
  </g>

  <!-- git server node -->
  <g class="intro d2">
    <circle class="ping" cx="600" cy="142" r="42" fill="none" stroke="#FF7A1A" stroke-width="2"/>
    <circle cx="600" cy="142" r="42" fill="#11151D" stroke="#33405a" stroke-width="1.5"/>
    <!-- git-branch glyph -->
    <g stroke="#FF8A2B" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="590" y1="128" x2="590" y2="156"/>
      <circle cx="590" cy="124" r="4.5" fill="#FF8A2B" stroke="none"/>
      <circle cx="590" cy="160" r="4.5" fill="#FF8A2B" stroke="none"/>
      <circle cx="613" cy="134" r="4.5" fill="#FF8A2B" stroke="none"/>
      <path d="M590 142 q0 -8 11 -8 t12 -0" stroke="#FF8A2B"/>
    </g>
    <text class="mono micro" x="600" y="206" text-anchor="middle">contexo</text>
  </g>

  <!-- Dev B card -->
  <g class="intro d3">
    <text class="mono micro" x="950" y="70">DEV&#160;B</text>
    <rect class="card" x="948" y="78" width="182" height="74" rx="12"/>
    <circle class="agent" cx="972" cy="102" r="7"/>
    <rect x="988" y="98" width="74" height="6" rx="3" fill="#3a4456"/>
    <rect class="ln litB" x="966" y="122" width="142" height="6" rx="3"/>
    <rect class="ln litB" x="966" y="136" width="104" height="6" rx="3"/>
  </g>

  <!-- Dev C card -->
  <g class="intro d4">
    <text class="mono micro" x="950" y="174">DEV&#160;C</text>
    <rect class="card" x="948" y="182" width="182" height="74" rx="12"/>
    <circle class="agent" cx="972" cy="206" r="7"/>
    <rect x="988" y="202" width="74" height="6" rx="3" fill="#3a4456"/>
    <rect class="ln litC" x="966" y="226" width="142" height="6" rx="3"/>
    <rect class="ln litC" x="966" y="240" width="104" height="6" rx="3"/>
  </g>

  <!-- ===== traveling knowledge packets ===== -->
  <g transform="translate(262,146)"><g class="pkt pPush">
    <circle r="9" fill="#FF7A1A" opacity="0.35" filter="url(#soft)"/>
    <circle r="4.5" fill="#FFB066"/>
  </g></g>
  <g transform="translate(648,130)"><g class="pkt pB">
    <circle r="9" fill="#FF7A1A" opacity="0.35" filter="url(#soft)"/>
    <circle r="4.5" fill="#FFB066"/>
  </g></g>
  <g transform="translate(648,156)"><g class="pkt pC">
    <circle r="9" fill="#FF7A1A" opacity="0.35" filter="url(#soft)"/>
    <circle r="4.5" fill="#FFB066"/>
  </g></g>

  <!-- ===== wordmark ===== -->
  <g class="intro d2">
    <text class="mono" x="74" y="298" font-size="44" fill="#FF7A1A" font-weight="700">&#9656;</text>
    <text class="mono word" x="116" y="300">contexo</text>
    <rect class="cursor" x="324" y="270" width="17" height="34" rx="2" fill="#FF7A1A"/>
  </g>
  <text class="mono tag intro d3" x="78" y="328">git-like&#160;AI&#160;Agent&#160;context&#160;versioning&#160;and&#160;synchronization</text>
</svg>
