services:
  ctxhub:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ctxhub
    image: ctxhub:latest
    container_name: ctxhub
    ports:
      - "${CTXHUB_PORT:-8080}:8080"
    volumes:
      - ctxhub_data:/data
    environment:
      CTXHUB_API_KEY: ${CTXHUB_API_KEY:?set CTXHUB_API_KEY in .env or env}
    restart: unless-stopped

volumes:
  ctxhub_data:
