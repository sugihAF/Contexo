services:
  contexo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: contexo:latest
    container_name: contexo
    ports:
      - "${CTXHUB_PORT:-8080}:8080"
    volumes:
      - contexo_data:/data
    environment:
      CONTEXO_API_KEY: ${CONTEXO_API_KEY:?set CONTEXO_API_KEY in .env or env}
    restart: unless-stopped

volumes:
  contexo_data:
